<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Length_conveter</title>
    <link rel="stylesheet" href="/LengthConventor/style.css">
</head>
<body>
    <div id="Wrapper">
        <h2>cm to inches</h2>
        <div class="input">
            <input type="text" id="input" placeholder="Length in cm">
        </div>
        <div>
            <button type="submit" onclick="convert()">Convert to inches</button>
        </div>
        <div id="result">
            
        </div>
    </div>
    <script>
        function convert(){
        const cmval=Number(document.getElementById("input").value)
        const inchval=cmval/2.54
        const result=document.getElementById("result")
        result.innerHTML=inchval.toFixed(2)+ "inches"//tofixed used to decimal
        }
    </script>
</body>
</html>
