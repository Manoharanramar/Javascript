<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math_function</title>
</head>
<body>
   <h1 id="message"></h1>
   <script>
    let message=document.getElementById("message")
    message.innerHTML="WELCOME TO OUR WEBSITE"

    let a=Math.round(5.8)//round off element 6
    console.log("let a=Math.round(5.8): "+a)

    let b=Math.floor(5.8)//top element 5
    console.log("let b=Math.floor(5.8): "+b)

    let c=Math.ceil(5.8)//full element 6
    console.log("let c=Math.ceil(5.8): "+c)

    let d=Math.sqrt(5)
    console.log("let d=Math.sqrt(5): "+d)

    let e=Math.abs(-10)
    console.log("let  e=Math.abs(-10): "+e)

    let f=Math.pow(10,4)
    console.log("let f=Math.pow(10,4): "+f)

    let g=Math.min(1,0,3)
    console.log("let g=Math.min(1,0,3): "+g)

    let h=Math.max(1,20,166)
    console.log("let h=Math.max(1,20,166): "+h)

    let j=Math.random()//random element
    console.log("let j=Math.random(): "+j)
    
    let k=Math.floor(Math.random()*6)+1
    console.log("let k=Math.floor(Math.random()*6)+1: "+k)//1 to 6

    let n=Math.PI
    console.log("let n=Math.PI: "+n)

    let m=Math.E//letter value
    console.log("let m=Math.E: "+m)
   </script> 
</body>
</html>
