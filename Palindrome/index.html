<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrome Checker</title>
    <link rel="stylesheet" href="/Palindrome/style.css">
</head>
<body>
     <div id="Wrapper">
        <h2>Palindrome Checker</h2>
        <div class="input">
            <input type="text" id="input" placeholder="Enter a string">
        </div>
        <div>
            <button type="submit" onclick="checkPalindrome()">Check Palindrome</button>
        </div>
        <div id="result">
            
        </div>
    </div>
    <script>
        function checkPalindrome(){
            const inputString=document.getElementById("input").value
            const reverse=inputString.split("").reverse().join("")
            const result=document.getElementById("result")
            if(inputString===reverse){
                result.innerHTML="The string is a palindrome."
            }
            else{
                result.innerHTML="The string is not a palindrome."
            }
        }
    </script>
</body>
</html>
