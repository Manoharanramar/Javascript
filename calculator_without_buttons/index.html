<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="/calculator_without_buttons/style.css">
</head>
<body>
    <div id="Wrapper">
        <h2>Calculator</h2>

        <input type="number" id="input1" placeholder="First number">
        <input type="text" id="operator" placeholder="+, -, *, /">
        <input type="number" id="input2" placeholder="Second number">
        <select id="operator">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select>
        <br><br>

        <button>Result</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
